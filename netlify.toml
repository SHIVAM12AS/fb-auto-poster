[build]
  base = "client"
  command = "npm run build"
  publish = "dist"

# API proxy — routes /api/* to Render backend
[[redirects]]
  from = "/api/*"
  to = "https://fb-auto-poster-api.onrender.com/api/:splat"
  status = 200
  force = true

# SPA fallback — all other routes go to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
